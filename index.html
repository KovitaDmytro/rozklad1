<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Розклад занять</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.18);
    --glass-bg-strong: rgba(255,255,255,0.28);
    --glass-border: rgba(255,255,255,0.45);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 1.5px 0 rgba(255,255,255,0.5) inset;
    --glass-shadow-strong: 0 16px 48px rgba(0,0,0,0.18), 0 1.5px 0 rgba(255,255,255,0.6) inset;
    --blur: blur(24px) saturate(1.8);
    --blur-heavy: blur(40px) saturate(2);
    --accent: #1D9E75;
    --accent2: #2ECC8A;
    --text-primary: #0a0a0f;
    --text-secondary: rgba(10,10,15,0.55);
    --text-tertiary: rgba(10,10,15,0.35);
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 12px;
    --radius-pill: 100px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    background: #c8eee0;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated blobs background */
  .bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.55;
    animation: floatBlob 18s ease-in-out infinite;
  }
  .blob-1 { width: 520px; height: 520px; background: radial-gradient(circle, #a8f0d8, #6dd5b0); top: -120px; left: -80px; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #b3e5fc, #81d4fa); top: 30%; right: -100px; animation-delay: -6s; }
  .blob-3 { width: 350px; height: 350px; background: radial-gradient(circle, #f8c8e0, #f48fb1); bottom: 10%; left: 20%; animation-delay: -12s; }
  .blob-4 { width: 300px; height: 300px; background: radial-gradient(circle, #fff9c4, #ffe082); bottom: -60px; right: 10%; animation-delay: -4s; }
  @keyframes floatBlob {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px,-30px) scale(1.06); }
    66% { transform: translate(-25px,20px) scale(0.96); }
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 20px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--glass-bg-strong);
    backdrop-filter: var(--blur-heavy);
    -webkit-backdrop-filter: var(--blur-heavy);
    border-bottom: 1px solid var(--glass-border);
    box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset, 0 4px 24px rgba(0,0,0,0.08);
  }
  .logo {
    display: flex; align-items: center; gap: 9px;
    font-size: 17px; font-weight: 700; color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .logo-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, #1D9E75, #0F6E56);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px;
    box-shadow: 0 4px 12px rgba(29,158,117,0.4);
  }
  .admin-badge {
    background: rgba(8,80,65,0.12);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(29,158,117,0.3);
    color: #085041;
    font-size: 11px; padding: 4px 11px; border-radius: 100px;
    font-weight: 600; display: none; align-items: center; gap: 4px;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .glass-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 100px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--text-primary); transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 1px 0 rgba(255,255,255,0.6) inset;
  }
  .glass-btn:hover {
    background: rgba(255,255,255,0.38);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.7) inset;
    transform: translateY(-1px);
  }
  .glass-btn:active { transform: scale(0.97); }
  .glass-btn.logout { border-color: rgba(226,75,74,0.35); color: #c0392b; }
  .glass-btn.logout:hover { background: rgba(226,75,74,0.1); }
  .login-btn { display: flex; }
  .logout-btn { display: none; }

  /* ── CONTENT ── */
  .content { padding: 20px 20px 40px; max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

  /* ── GROUP SELECTOR ── */
  .group-section {
    margin-bottom: 18px;
    background: var(--glass-bg);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    box-shadow: var(--glass-shadow);
  }
  .group-section-title {
    font-size: 12px; font-weight: 700; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .group-tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .group-tab {
    padding: 8px 18px; border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); transition: all 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .group-tab:hover { background: rgba(255,255,255,0.35); color: var(--text-primary); }
  .group-tab.active {
    background: linear-gradient(135deg, #1D9E75, #27ae7a);
    color: white;
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(29,158,117,0.4), 0 1px 0 rgba(255,255,255,0.3) inset;
  }
  .groups-toggle-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 100px;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    white-space: nowrap;
  }
  .groups-toggle-btn:hover { background: rgba(255,255,255,0.35); color: var(--text-primary); }
  .group-tabs-wrap {
    display: flex; align-items: center; gap: 8px; flex-wrap: nowrap;
  }
  .group-tabs-list {
    display: flex; gap: 8px; flex-wrap: wrap;
    overflow: hidden; max-height: 0;
    transition: max-height 0.3s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .group-tabs-list.open {
    max-height: 300px; opacity: 1;
  }
  .group-tab.more-tab {
    background: rgba(255,255,255,0.15);
    border-style: dashed;
    color: var(--text-secondary);
    letter-spacing: 0.03em;
  }
  .group-tab.more-tab:hover { background: rgba(255,255,255,0.3); color: var(--text-primary); }
  .group-tab.collapse-tab { font-size: 12px; }
  .group-tab.all-tab.active {
    background: linear-gradient(135deg, #485563, #29323c);
    box-shadow: 0 4px 16px rgba(40,50,70,0.35), 0 1px 0 rgba(255,255,255,0.2) inset;
  }



  /* ── TOOLBAR ── */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }


  .add-btn {
    display: none; align-items: center; gap: 7px;
    padding: 9px 20px; border-radius: 100px;
    border: none;
    background: linear-gradient(135deg, #1D9E75, #0F6E56);
    color: white; cursor: pointer; font-size: 13px; font-weight: 700;
    box-shadow: 0 4px 20px rgba(29,158,117,0.45), 0 1px 0 rgba(255,255,255,0.25) inset;
    transition: all 0.2s; letter-spacing: -0.1px;
  }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(29,158,117,0.5); }
  .add-btn:active { transform: scale(0.97); }

  /* ── DAY BLOCKS ── */
  .days-grid { display: flex; flex-direction: column; gap: 12px; }

  .day-block {
    background: var(--glass-bg);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--glass-shadow);
    transition: box-shadow 0.2s;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .day-block:hover { box-shadow: var(--glass-shadow-strong); }

  .day-header {
    padding: 12px 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.3);
  }
  .day-mon .day-header { background: rgba(209,245,230,0.4); }
  .day-tue .day-header { background: rgba(220,218,254,0.4); }
  .day-wed .day-header { background: rgba(250,238,218,0.4); }
  .day-thu .day-header { background: rgba(214,231,251,0.4); }
  .day-fri .day-header { background: rgba(251,234,240,0.4); }
  .day-sat .day-header { background: rgba(181,212,244,0.4); }

  .day-name { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
  .day-mon .day-name { color: #0a5c43; }
  .day-tue .day-name { color: #3C3489; }
  .day-wed .day-name { color: #633806; }
  .day-thu .day-name { color: #0C447C; }
  .day-fri .day-name { color: #72243E; }
  .day-sat .day-name { color: #042C53; }
  .day-count {
    font-size: 11px; font-weight: 600; color: var(--text-tertiary);
    background: rgba(255,255,255,0.45);
    padding: 3px 10px; border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.6);
  }

  /* ── LESSONS ── */
  .lessons { padding: 10px; display: flex; flex-direction: column; gap: 6px; }

  .lesson-row {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 13px; border-radius: var(--radius-md);
    background: rgba(255,255,255,0.22);
    border: 1px solid rgba(255,255,255,0.5);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: all 0.18s; flex-wrap: wrap;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04), 0 1px 0 rgba(255,255,255,0.6) inset;
  }
  .lesson-row:hover {
    background: rgba(255,255,255,0.38);
    border-color: rgba(255,255,255,0.7);
    box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 1px 0 rgba(255,255,255,0.7) inset;
    transform: translateY(-1px);
  }

  .time-col { min-width: 62px; font-size: 13px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
  .time-dur { font-size: 11px; color: var(--text-tertiary); font-weight: 500; }

  .divider-line {
    width: 1.5px; height: 36px; border-radius: 2px;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.12), transparent);
    flex-shrink: 0;
  }

  .subject-col { flex: 1; min-width: 150px; }
  .subject-name { font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.1px; }
  .subject-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; display: flex; align-items: center; gap: 4px; }

  /* Group badge on lesson */
  .group-badge-lesson {
    font-size: 10px; padding: 2px 8px; border-radius: 100px;
    font-weight: 700; letter-spacing: 0.03em; white-space: nowrap;
    background: rgba(29,158,117,0.12); color: #0a5c43;
    border: 1px solid rgba(29,158,117,0.25);
  }

  .type-badge {
    font-size: 11px; padding: 4px 10px; border-radius: 100px;
    font-weight: 700; white-space: nowrap; letter-spacing: 0.02em;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .type-lec  { background: rgba(214,231,251,0.7); color: #0C447C; border: 1px solid rgba(133,183,235,0.5); }
  .type-prac { background: rgba(209,245,230,0.7); color: #085041; border: 1px solid rgba(93,202,165,0.5); }
  .type-lab  { background: rgba(250,238,218,0.7); color: #633806; border: 1px solid rgba(250,199,117,0.5); }
  .type-sem  { background: rgba(220,218,254,0.7); color: #3C3489; border: 1px solid rgba(175,169,236,0.5); }

  /* Checkboxes for group selection */
  .group-checks {
    display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px;
  }
  .group-check-label {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 13px; border-radius: 100px;
    border: 1.5px solid rgba(0,0,0,0.1);
    background: rgba(255,255,255,0.45);
    cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); transition: all 0.15s;
    user-select: none;
  }
  .group-check-label:hover { background: rgba(255,255,255,0.65); color: var(--text-primary); }
  .group-check-label input[type=checkbox] { display: none; }
  .group-check-label.checked {
    background: linear-gradient(135deg, #1D9E75, #27ae7a);
    color: white; border-color: transparent;
    box-shadow: 0 3px 10px rgba(29,158,117,0.35);
  }
  .group-check-shared {
    background: rgba(40,50,70,0.08); color: #29323c;
    border-color: rgba(40,50,70,0.15);
  }
  .group-check-shared.checked {
    background: linear-gradient(135deg, #485563, #29323c);
    color: white; border-color: transparent;
    box-shadow: 0 3px 10px rgba(40,50,70,0.3);
  }
  .zoom-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #2D8CFF, #1a6fd4);
    padding: 4px 11px; border-radius: 8px;
    text-decoration: none; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(45,140,255,0.35);
    transition: all 0.18s;
  }
  .zoom-badge:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(45,140,255,0.5);
  }
  .room-badge {
    font-size: 12px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.4);
    padding: 4px 10px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.6); white-space: nowrap;
    font-weight: 600;
  }

  .actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-edit {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 10px;
    border: 1px solid rgba(133,183,235,0.5);
    background: rgba(214,231,251,0.5);
    backdrop-filter: blur(8px);
    cursor: pointer; font-size: 12px; color: #0C447C; font-weight: 600; transition: all 0.15s;
  }
  .btn-edit:hover { background: rgba(181,212,244,0.7); }
  .btn-del {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 10px;
    border: 1px solid rgba(240,149,149,0.5);
    background: rgba(252,235,235,0.5);
    backdrop-filter: blur(8px);
    cursor: pointer; font-size: 12px; color: #791F1F; font-weight: 600; transition: all 0.15s;
  }
  .btn-del:hover { background: rgba(247,193,193,0.7); }
  .btn-dup {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 10px;
    border: 1px solid rgba(150,200,150,0.5);
    background: rgba(220,248,230,0.5);
    backdrop-filter: blur(8px);
    cursor: pointer; font-size: 12px; color: #1D6B3A; font-weight: 600; transition: all 0.15s;
  }
  .btn-dup:hover { background: rgba(180,235,195,0.7); }
  .export-btn {
    color: #085041;
    border-color: rgba(29,158,117,0.4);
    background: rgba(29,158,117,0.1);
  }
  .export-btn:hover { background: rgba(29,158,117,0.18) !important; }

  /* ── EXPORT MODAL ── */
  .export-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .export-option {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: var(--radius-md);
    border: 1.5px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.3);
    cursor: pointer; transition: all 0.18s;
    user-select: none;
  }
  .export-option:hover { background: rgba(255,255,255,0.5); border-color: rgba(29,158,117,0.4); transform: translateY(-1px); }
  .export-option.selected { background: rgba(29,158,117,0.12); border-color: rgba(29,158,117,0.55); }
  .export-option-icon {
    width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .export-option-icon.pdf { background: linear-gradient(135deg, #ff6b6b, #c0392b); color: white; }
  .export-option-icon.img { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
  .export-option-text { flex: 1; }
  .export-option-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .export-option-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .export-scope { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .export-scope-btn {
    padding: 7px 14px; border-radius: 100px;
    border: 1.5px solid rgba(0,0,0,0.1);
    background: rgba(255,255,255,0.35);
    cursor: pointer; font-size: 12px; font-weight: 600;
    color: var(--text-secondary); transition: all 0.15s;
  }
  .export-scope-btn.active { background: rgba(29,158,117,0.15); border-color: rgba(29,158,117,0.5); color: #085041; }
  .export-progress {
    display: none; text-align: center; padding: 16px;
    font-size: 13px; color: var(--text-secondary); font-weight: 500;
  }
  .export-progress.show { display: block; }
  .export-spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2.5px solid rgba(29,158,117,0.2);
    border-top-color: #1D9E75;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 7px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Export print area */
  #exportCanvas {
    position: fixed; left: -9999px; top: 0;
    width: 900px; background: #f0faf6;
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
    padding: 32px; z-index: -1;
  }
  .lesson-row.is-current {
    background: rgba(29,158,117,0.18) !important;
    border-color: rgba(29,158,117,0.55) !important;
    box-shadow: 0 0 0 2px rgba(29,158,117,0.22), 0 4px 20px rgba(29,158,117,0.18), 0 1px 0 rgba(255,255,255,0.7) inset !important;
    transform: translateY(-1px);
  }
  .lesson-row.is-current .subject-name { color: #085041; }
  .now-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 100px;
    background: linear-gradient(135deg, #1D9E75, #27ae7a);
    color: white; font-size: 10px; font-weight: 800;
    letter-spacing: 0.05em; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(29,158,117,0.45);
    animation: nowPulse 2s ease-in-out infinite;
  }
  @keyframes nowPulse {
    0%,100% { box-shadow: 0 2px 8px rgba(29,158,117,0.45); }
    50% { box-shadow: 0 2px 16px rgba(29,158,117,0.75); }
  }

  .lesson-row.is-hidden {
    opacity: 0.45;
    border-style: dashed;
    border-color: rgba(0,0,0,0.15);
    background: rgba(255,255,255,0.1);
  }
  .hidden-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 9px; border-radius: 100px;
    background: rgba(120,120,140,0.15);
    border: 1px solid rgba(120,120,140,0.3);
    font-size: 11px; font-weight: 600; color: #666;
  }
  .btn-hide {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 10px;
    border: 1px solid rgba(180,150,220,0.5);
    background: rgba(240,225,255,0.5);
    backdrop-filter: blur(8px);
    cursor: pointer; font-size: 12px; color: #5B2D8E; font-weight: 600; transition: all 0.15s;
  }
  .btn-hide:hover { background: rgba(220,190,255,0.7); }
  .btn-archive {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 10px;
    border: 1px solid rgba(200,160,80,0.45);

  @media(max-width: 600px) {

    .lesson-row {

    .now-badge { flex-shrink: 0; font-size: 9px; padding: 2px 7px; align-self: center; }

    /* lesson-details — завжди в останньому рядку через order */

      padding: 6px;

      align-self: center;
      flex-shrink: 0;
      margin-left: 4px;
      width: 30px;
      height: 30px;
      font-size: 14px;
    }

    .lesson-row.info-open {

    .lesson-row.info-open .lesson-details {
      display: flex;
      flex-wrap: wrap;

    .lesson-row.info-open .actions .btn-dup,
    .lesson-row.info-open .actions .btn-archive { display: flex; }

    .lesson-row.info-open .actions { align-self: flex-start; }
    .lesson-row.info-open .btn-info { align-self: flex-start; }
  }
</style>
</head>

// ── Пари ─────────────────────────────────────────────
const PERIODS = [
  { num: 'І',    start: '08:30', end: '09:50' },
  { num: 'ІІ',   start: '10:00', end: '11:20' },
  { num: 'ІІІ',  start: '11:40', end: '13:00' },
  { num: 'ІV',   start: '13:10', end: '14:30' },
  { num: 'V',    start: '14:40', end: '16:00' },
  { num: 'VІ',   start: '16:10', end: '17:30' },
  { num: 'VІІ',  start: '17:40', end: '19:00' },
];

let semesterStart = null; // дата початку семестру (рядок YYYY-MM-DD з Firebase)
let appSettings = {};

// Повертає 1 або 2 (номер навчального тижня відносно дати початку семестру)
function getCurrentWeekNum() {
  if (!semesterStart) return 1;
  const start = new Date(semesterStart);
  start.setHours(0,0,0,0);
  const now = new Date();
  now.setHours(0,0,0,0);
  const diffDays = Math.floor((now - start) / 86400000);
  if (diffDays < 0) return 1;
  const weekIndex = Math.floor(diffDays / 7); // 0-based
  return (weekIndex % 2) + 1; // 1 або 2
}

// Знаходить пару за часом початку (08:30 → 'І' тощо)
function getPeriodByTime(time) {
  if (!time) return null;
  return PERIODS.find(p => p.start === time) || null;
}

// ── URL slug helpers ──────────────────────────────────
// (slugify/getGroupBySlug видалено — замінено на числові ID)
function getGroupFromURL() {
  return new URLSearchParams(window.location.search).get('group');
}

// ── Отримуємо унікальні групи ─────────────────────────
// ── Генерація 6-значного числового ID ────────────────
function generateGroupId() {
  const existing = new Set(Object.values(extraGroups).map(g => typeof g === 'object' ? g.id : ''));
  let id;
  do { id = String(Math.floor(100000 + Math.random() * 900000)); }
  while (existing.has(id));
  return id;
}

// ── Отримуємо унікальні групи (масив {name, id}) ──────
function getGroups() {
  const map = {}; // name → id
  Object.entries(extraGroups).forEach(([key, g]) => {
    if (typeof g === 'object' && g.name) {
      map[g.name.trim()] = g.id || key;
    } else if (typeof g === 'string' && g.trim()) {
      map[g.trim()] = key; // старий формат
    } else if (g === true && key.trim()) {
      map[key.trim()] = key.trim(); // старий формат bool
    }
  });
  Object.values(lessons).forEach(l => {
    const gs = Array.isArray(l.group) ? l.group : (l.group ? [l.group] : []);
    gs.forEach(name => { if (name && name.trim() && !map[name.trim()]) map[name.trim()] = name.trim(); });
  });
  return Object.entries(map).map(([name, id]) => ({ name, id })).sort((a,b) => a.name.localeCompare(b.name, 'uk'));
}

// ── Знайти групу за ID з URL ──────────────────────────
function getGroupByURLId(urlId) {
  return getGroups().find(g => g.id === urlId) || null;
}

// ── Оновлення UI залежно від ролі ─────────────────────
function updateLayout() {
  const urlId = getGroupFromURL();
  const matched = urlId ? getGroupByURLId(urlId) : null;
  // Студент: завжди синхронізуємо activeGroup зі slug
  if (!isAdmin && matched) activeGroup = matched.name;

  const studentHeader = document.getElementById('studentGroupHeader');
  const groupSection  = document.getElementById('groupSection');
  const noGroupScreen = document.getElementById('noGroupScreen');
  const toolbar       = document.querySelector('.toolbar');
  const grid          = document.getElementById('daysGrid');
  

  if (isAdmin) {
    // Адмін — показуємо всі таби груп
    studentHeader.style.display = 'none';
    groupSection.style.display  = 'flex';
    noGroupScreen.style.display = 'none';
    if (toolbar) toolbar.style.display = 'flex';
    if (grid) grid.style.display = '';
    
    renderGroupTabs();
    render();
    document.title = 'Розклад — Адмін';
  } else if (matched) {
    // Студент із правильним посиланням
    activeGroup = matched.name;
    studentHeader.style.display = 'flex';
    document.getElementById('studentGroupName').textContent = matched.name;
    groupSection.style.display  = 'none';
    noGroupScreen.style.display = 'none';
    if (toolbar) toolbar.style.display = 'flex';
    if (grid) grid.style.display = '';
    
    render();
    document.title = `Розклад — ${matched.name}`;
  } else {
    // Немає параметра або невідомий ID — заглушка
    studentHeader.style.display = 'none';
    groupSection.style.display  = 'none';
    noGroupScreen.style.display = 'block';
    if (toolbar) toolbar.style.display = 'none';
    if (grid) grid.style.display = 'none';
    
    document.title = 'Розклад занять';
  }
}

// ── Рендер табів груп (тільки для адміна) ─────────────
let groupsExpanded = false;
function renderGroupTabs() {
  const groups = getGroups(); // [{name, id}]
  const tabs = document.getElementById('groupTabs');
  tabs.innerHTML = '';
  const isMobile = window.innerWidth <= 600;
  if (isMobile) {
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'groups-toggle-btn';
    toggleBtn.innerHTML = groupsExpanded
      ? '<i class="ti ti-chevron-up" style="font-size:14px"></i> Приховати групи'
      : '<i class="ti ti-chevron-down" style="font-size:14px"></i> Показати групи';
    toggleBtn.addEventListener('click', () => { groupsExpanded = !groupsExpanded; renderGroupTabs(); });
    tabs.appendChild(toggleBtn);
  }
  const list = document.createElement('div');
  list.className = 'group-tabs-list' + (!isMobile || groupsExpanded ? ' open' : '');
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'group-tab' + (activeGroup === g.name ? ' active' : '');
    btn.textContent = g.name;
    btn.addEventListener('click', () => { activeGroup = g.name; renderGroupTabs(); render(); });
    list.appendChild(btn);
  });
  tabs.appendChild(list);
}

// --- Current lesson detection ---
const dayNamesUk = ['Неділя','Понеділок','Вівторок','Середа','Четвер','Пятниця','Субота'];
function getCurrentLesson(lessonList) {
  const now = new Date();
  const todayUk = dayNamesUk[now.getDay()];
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const currentWeek = getCurrentWeekNum();
  const active = new Set();
  lessonList.forEach(([id, l]) => {
    if (l.day !== todayUk) return;
    // Фільтр тижня
    if (l.week && l.week !== 'all' && parseInt(l.week) !== currentWeek) return;
    const match = l.time && l.time.match(/^(\d{1,2}):(\d{2})/);
    if (!match) return;
    const start = parseInt(match[1]) * 60 + parseInt(match[2]);
    // Шукаємо кінець пари з PERIODS, або +80 хв за замовчуванням
    const period = getPeriodByTime(l.time);
    let end;
    if (period) {
      const [eh, em] = period.end.split(':').map(Number);
      end = eh * 60 + em;
    } else {
      const dur = parseFloat(l.dur) || 1.5;
      end = start + Math.round(dur * 60);
    }
    if (nowMins >= start && nowMins < end) active.add(id);
  });
  return active;
}

  const grid = document.getElementById('daysGrid');
  const filtered = activeDay === 'all' ? days : days.filter(d => d === activeDay);

  const currentIds = getCurrentLesson(allEntries);

  grid.innerHTML = filtered.map((day, idx) => {
    let entries = Object.entries(lessons).filter(([, l]) => l.day === day);

    // Фільтр по групі
    if (activeGroup !== 'all') {
      entries = entries.filter(([, l]) => {
        const g = Array.isArray(l.group) ? l.group : (l.group ? [l.group] : []);
        return g.length === 0 || g.includes(activeGroup);
      });
    }

    // Архівовані — не показувати
    entries = entries.filter(([, l]) => !l.archived);

    // Приховані — лише адмін
    if (!isAdmin) {
      entries = entries.filter(([, l]) => !l.hidden);
    }

    // Фільтр тижня: студент бачить лише поточний тиждень, адмін — всі
    const visibleEntries = isAdmin
      ? entries
      : entries.filter(([, l]) => {
          if (!l.week || l.week === 'all') return true;
          return parseInt(l.week) === currentWeek;
        });

    // Будуємо map: час → заняття
    const lessonsByTime = {};
    visibleEntries.forEach(([id, l]) => {
      lessonsByTime[l.time] = lessonsByTime[l.time] || [];
      lessonsByTime[l.time].push([id, l]);
    });

    const cls = dayCls[day] || '';

    // Рядки по кожній парі
    const rows = PERIODS.map(period => {
      const periodLessons = lessonsByTime[period.start] || [];
      const isCurrent = new Date().getHours() * 60 + new Date().getMinutes() >= (() => { const [h,m] = period.start.split(':'); return +h*60+ +m; })()
        && new Date().getHours() * 60 + new Date().getMinutes() < (() => { const [h,m] = period.end.split(':'); return +h*60+ +m; })()
        && dayNamesUk[new Date().getDay()] === day;

        // Порожня пара — показуємо заглушку

          <div class="lesson-row period-empty">

              <div class="subject-name" style="font-size:12px;font-weight:500;color:var(--text-tertiary)">— вільно —</div>
            </div>
          </div>`;
      }

      return periodLessons.map(([id, l]) => {
        const groupArr2 = Array.isArray(l.group) ? l.group : (l.group ? [l.group] : []);
        const isShared = groupArr2.length === 0;

        const isCurrentLesson = currentIds.has(id);
        const nowBadge = isCurrentLesson ? '<span class="now-badge"><i class="ti ti-broadcast" style="font-size:10px"></i> ЗАРАЗ</span>' : '';
        // Значок тижня

        if (l.week && l.week !== 'all') {
          weekBadge = `<span class="week-badge w${l.week}">${l.week}-й тижд.</span>`;
        }
        return `
          <div class="lesson-row${l.hidden ? ' is-hidden' : ''}${isCurrentLesson ? ' is-current' : ''}">
            <div class="period-num-col">${period.num}</div>
            <div class="period-time-col">${period.start}<span class="period-time-end">${period.end}</span></div>
            <div class="divider-line"></div>
            <div class="subject-col">
              <div class="subject-name">${l.subject}</div>
              <div class="subject-meta"><i class="ti ti-user" style="font-size:11px"></i> ${l.teacher} ${groupLabel}</div>
            </div>

              <span class="type-badge type-${l.type}">${typeLabels[l.type] || l.type}</span>

              ${isAdmin && l.hidden ? '<span class="hidden-badge"><i class="ti ti-eye-off" style="font-size:10px"></i> Приховано</span>' : ''}
            </div>

    }).join('');

    const totalVisible = visibleEntries.length;
    return `<div class="day-block ${cls}" style="animation-delay:${idx * 0.05}s">
      <div class="day-header">

        <span class="day-count">${totalVisible} занять</span>
      </div>

    </div>`;
  }).join('');
}

// Ініціалізація чекбоксів після рендеру форми
function initGroupChecks() {
  const container = document.getElementById('fGroupChecks');
  if (!container) return;
  container.querySelectorAll('.group-check-label').forEach(label => {
    const cb = label.querySelector('input[type=checkbox]');
    if (cb && cb.checked) label.classList.add('checked');
    label.addEventListener('click', (e) => {
      e.preventDefault();
      cb.checked = !cb.checked;
      label.classList.toggle('checked', cb.checked);
    });
  });
}
window.saveLesson = async (id) => {
  const s = document.getElementById('fSubject').value.trim();
  if (!s) { alert('Введіть назву предмету'); return; }

  const teacher = document.getElementById('fTeacher').value.trim();
  const day = document.getElementById('fDay').value;
  const time = document.getElementById('fPeriod').value;
  const week = document.querySelector('input[name=fWeek]:checked')?.value || 'all';

  // Calculate duration from PERIODS
  const period = PERIODS.find(p => p.start === time);
  const dur = period ? (() => {
    const [sh, sm] = period.start.split(':').map(Number);
    const [eh, em] = period.end.split(':').map(Number);
    const mins = (eh * 60 + em) - (sh * 60 + sm);
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return h + ':' + String(m).padStart(2, '0');
  })() : '1:20';

  const checkboxes = document.querySelectorAll('#fGroupChecks input[type=checkbox]');
  const group = [...checkboxes].filter(c => c.checked && c.value).map(c => c.value);

  // ── Перевірка конфлікту викладача ──
  // Конфлікт = той самий викладач, той самий день, та сама пара, і тижні перекриваються
  // Тижні перекриваються якщо: хоча б одне з них "all", або обидва однакові
  // Виняток: якщо тижні НЕ 'all' і вони різні (1 vs 2) — не конфлікт (різні тижні чергування)
  if (teacher) {
    const weeksOverlap = (w1, w2) => {
      if (w1 === 'all' || w2 === 'all') return true;
      return w1 === w2;
    };

    const conflict = Object.entries(lessons).find(([lid, l]) => {
      if (lid === id) return false;
      if (l.archived || l.hidden) return false;
      if (l.teacher !== teacher) return false;
      if (l.day !== day) return false;
      if (l.time !== time) return false;
      if (!weeksOverlap(week, l.week || 'all')) return false;
      return true;
    });

    if (conflict) {
      const cl = conflict[1];
      const periodLabel = PERIODS.find(p => p.start === time);
      const clGroups = Array.isArray(cl.group) ? cl.group : (cl.group ? [cl.group] : []);
      const clGroupStr = clGroups.length ? ` (${clGroups.join(', ')})` : ' (спільне)';
      alert(`⚠️ Конфлікт розкладу!\n\nВикладач "${teacher}" вже має заняття у цей час:\n"${cl.subject}"${clGroupStr} — ${cl.day}, ${periodLabel ? periodLabel.num + ' пара' : time}\n\nВикладач не може вести два заняття одночасно.`);
      return;
    }
  }

  const obj = {
    subject: s,
    teacher,
    day,
    type: document.getElementById('fType').value,
    time,
    dur,
    room: document.getElementById('fRoom').value.trim(),
    group,
    zoom: document.getElementById('fZoom').value.trim(),
    week
  };
  if (id) {
    await update(ref(db, 'lessons/' + id), obj);
    showToast('✅ Заняття оновлено', 'green');
  } else {
    await push(lessonsRef, obj);
    showToast('✅ Заняття додано', 'green');
  }
  closeModal();
};

function renderCatalogModal() {
  const tab = catalogActiveTab;
  const isSubjects = tab === 'subjects';
  const isTeachers = tab === 'teachers';
  const isGroups   = tab === 'groups';

  let listHTML = '';
  let addRow = '';

  if (isGroups) {

                <button class="gbtn-cancel" style="padding:5px 10px;border-radius:100px;border:1px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.05);color:#666;font-size:12px;font-weight:700;cursor:pointer"><i class="ti ti-x"></i></button>
              </div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button class="btn-cat-edit gbtn-edit"><i class="ti ti-pencil"></i></button>
              <button class="btn-cat-del gbtn-del"><i class="ti ti-trash"></i></button>
            </div>
          </div>`).join('')
      : '<div class="archive-empty"><i class="ti ti-users" style="font-size:28px;display:block;margin-bottom:8px;opacity:.3"></i>Груп немає</div>';
    addRow = `<div class="catalog-add-row">
        <input id="catName" placeholder="Назва групи (напр. ІПЗ-23-1)" maxlength="30" />
        <button class="btn-cat-add" id="catAddBtn"><i class="ti ti-plus"></i> Додати</button>
      </div>`;
  } else {
    const items = isSubjects ? catalogSubjects : catalogTeachers;
    listHTML = Object.entries(items).length
      ? Object.entries(items).map(([id, item]) => `
          <div class="catalog-item">
            <div class="catalog-item-info">
              <div class="catalog-item-name">${item.name}</div>
              ${item.code ? '<div class="catalog-item-sub">' + item.code + '</div>' : ''}
              ${item.title ? '<div class="catalog-item-sub">' + item.title + '</div>' : ''}
            </div>
            <button class="btn-cat-del" onclick="deleteCatalogItem('${id}')"><i class="ti ti-trash"></i></button>
          </div>`).join('')
      : '<div class="archive-empty"><i class="ti ti-database" style="font-size:28px;display:block;margin-bottom:8px;opacity:.3"></i>Список порожній</div>';
    addRow = isSubjects
      ? `<div class="catalog-add-row">
          <input id="catName" placeholder="Назва предмету" />
          <input id="catCode" placeholder="Код (необов'язково)" style="max-width:130px" />
          <button class="btn-cat-add" onclick="addCatalogItem()"><i class="ti ti-plus"></i> Додати</button>
        </div>`
      : `<div class="catalog-add-row">
          <input id="catName" placeholder="ПІБ викладача" />
          <input id="catCode" placeholder="Посада (необов'язково)" style="max-width:150px" />
          <button class="btn-cat-add" onclick="addCatalogItem()"><i class="ti ti-plus"></i> Додати</button>
        </div>`;
  }

  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-title"><i class="ti ti-books"></i> Каталог</div>
    <div class="catalog-tabs">
      <button class="catalog-tab ${isSubjects ? 'active' : ''}" onclick="switchCatalogTab('subjects')"><i class="ti ti-book"></i> Предмети</button>
      <button class="catalog-tab ${isTeachers ? 'active' : ''}" onclick="switchCatalogTab('teachers')"><i class="ti ti-user"></i> Викладачі</button>
      <button class="catalog-tab ${isGroups ? 'active' : ''}" onclick="switchCatalogTab('groups')"><i class="ti ti-users"></i> Групи</button>
    </div>
    <div class="catalog-list">${listHTML}</div>
    ${addRow}
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn-cancel" onclick="closeModal()">Закрити</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');

  // Bind group events via addEventListener (safe for any group name)
  if (isGroups) {
    // Add button
    const catAddBtn = document.getElementById('catAddBtn');
    const catNameIn = document.getElementById('catName');
    if (catAddBtn) catAddBtn.addEventListener('click', addGroupFromCatalog);
    if (catNameIn) catNameIn.addEventListener('keydown', e => { if (e.key === 'Enter') addGroupFromCatalog(); });

    // Per-row buttons
    modal.querySelectorAll('.catalog-item[data-gid]').forEach(item => {
      const gid  = item.dataset.gid;
      const gname = item.dataset.gname;
      const view  = item.querySelector('.gname-view');
      const editBox = item.querySelector('.gname-edit');
      const inp   = item.querySelector('.ginput');

      const showEdit = () => {
        view.style.display = 'none';
        editBox.style.display = 'flex';
        inp.focus(); inp.select();
      };
      const hideEdit = () => {
        view.style.display = 'flex';
        editBox.style.display = 'none';
        inp.value = gname;
      };
      const doSave = async () => {
        const newName = inp.value.trim();
        if (!newName) { inp.focus(); return; }
        if (newName === gname) { hideEdit(); return; }
        if (getGroups().some(g => g.name === newName)) { alert('Група «' + newName + '» вже існує'); inp.focus(); return; }
        const entry = Object.entries(extraGroups).find(([, g]) => (typeof g === 'object' ? g.id : '') === gid);
        if (!entry) return;
        await update(ref(db, 'groups/' + entry[0]), { name: newName });
        const updates = {};
        Object.entries(lessons).forEach(([lid, l]) => {
          const gs = Array.isArray(l.group) ? l.group : (l.group ? [l.group] : []);
          if (gs.includes(gname)) updates['lessons/' + lid + '/group'] = gs.map(x => x === gname ? newName : x);
        });
        if (Object.keys(updates).length) await update(ref(db), updates);
        showToast('✅ Групу перейменовано', 'green');
        renderCatalogModal();
        renderGroupTabs();
      };

      item.querySelector('.gbtn-edit').addEventListener('click', showEdit);
      item.querySelector('.gbtn-cancel').addEventListener('click', hideEdit);
      item.querySelector('.gbtn-save').addEventListener('click', doSave);
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSave();
        if (e.key === 'Escape') hideEdit();
      });
      item.querySelector('.gbtn-del').addEventListener('click', () => deleteGroup(gname));
    });
  }
}

window.deleteGroup = async (name) => {
  // Знайти Firebase-ключ групи за name
  const entry = Object.entries(extraGroups).find(([, g]) => (typeof g === 'object' ? g.name : g) === name);
  if (entry) await remove(ref(db, 'groups/' + entry[0]));
  // Also remove from all lessons
  const updates = {};
  Object.entries(lessons).forEach(([id, l]) => {
    const g = Array.isArray(l.group) ? l.group : (l.group ? [l.group] : []);
    if (g.includes(name)) {
      updates['lessons/' + id + '/group'] = g.filter(x => x !== name);
    }
  });
  if (Object.keys(updates).length) await update(ref(db), updates);
  showToast('🗑 Групу видалено', 'red');
  renderCatalogModal();
  renderGroupTabs();
};

  const filteredDays = exportScope === 'all' ? days : days.filter(d => d === exportScope);

  const typeColors = {lec:'#0C447C',prac:'#085041',lab:'#633806',sem:'#3C3489'};
  const typeBg = {lec:'#d6e7fb',prac:'#d1f5e6',lab:'#faeeda',sem:'#dcdafe'};
  const typeLabelsLocal = {lec:'Лекція',prac:'Практика',lab:'Лабораторна',sem:'Семінар'};

  const dayHeaderColors = {
    Понеділок:'#d1f5e6',Вівторок:'#dcdafe',Середа:'#faeeda',
    Четвер:'#d6e7fb',Пятниця:'#fbeaf0',Субота:'#b5d4f4'
  };
  const dayTextColors = {
    Понеділок:'#0a5c43',Вівторок:'#3C3489',Середа:'#633806',
    Четвер:'#0C447C',Пятниця:'#72243E',Субота:'#042C53'
  };

  let html = `
    <div style="margin-bottom:24px;display:flex;align-items:center;gap:12px">
      <div style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#1D9E75,#0F6E56);display:flex;align-items:center;justify-content:center;color:white;font-size:20px">📅</div>
      <div>
        <div style="font-size:20px;font-weight:800;color:#0a0a0f;letter-spacing:-0.5px">Розклад занять</div>
        <div style="font-size:13px;color:#666;margin-top:2px">Група: <strong>${groupLabel}</strong> · ${new Date().toLocaleDateString('uk-UA',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
    </div>`;

  filteredDays.forEach(day => {
    let entries = Object.entries(lessons).filter(([,l]) => l.day === day && !l.archived && !l.hidden);
    if (activeGroup !== 'all') {
      entries = entries.filter(([,l]) => {
        const g = Array.isArray(l.group) ? l.group : (l.group ? [l.group] : []);
        return g.length === 0 || g.includes(activeGroup);
      });
    }
    entries.sort((a,b) => a[1].time.localeCompare(b[1].time));

    const hc = dayHeaderColors[day] || '#eee';
    const tc = dayTextColors[day] || '#333';

    html += `<div style="margin-bottom:14px;border-radius:16px;overflow:hidden;border:1px solid rgba(0,0,0,0.08);box-shadow:0 2px 8px rgba(0,0,0,0.07)">
      <div style="padding:10px 16px;background:${hc};display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px;font-weight:800;color:${tc}">${day}</span>
        <span style="font-size:11px;font-weight:600;color:${tc};opacity:.7;background:rgba(255,255,255,0.5);padding:2px 10px;border-radius:100px">${entries.length} занять</span>
      </div>
      <div style="background:white;padding:8px">`;

    if (!entries.length) {
      html += `<div style="text-align:center;padding:16px;font-size:12px;color:#aaa">Занять немає</div>`;
    } else {
      entries.forEach(([,l]) => {
        const bg = typeBg[l.type] || '#f5f5f5';
        const clr = typeColors[l.type] || '#333';
        const lbl = typeLabelsLocal[l.type] || l.type;
        const groups2 = Array.isArray(l.group) ? l.group : (l.group ? [l.group] : []);
        const grpTag = groups2.length ? `<span style="font-size:10px;padding:2px 7px;background:rgba(29,158,117,0.1);color:#0a5c43;border-radius:100px;font-weight:700">${groups2.join(', ')}</span>` : '';
        html += `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;margin-bottom:4px;background:#fafffe;border:1px solid rgba(0,0,0,0.05)">
            <div style="min-width:54px;font-size:13px;font-weight:800;color:#0a0a0f;line-height:1.3">${l.time}<div style="font-size:10px;color:#999;font-weight:500">${l.dur} год</div></div>
            <div style="width:1.5px;height:34px;background:linear-gradient(to bottom,transparent,rgba(0,0,0,0.1),transparent);flex-shrink:0"></div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:700;color:#0a0a0f">${l.subject}</div>
              <div style="font-size:11px;color:#888;margin-top:2px;display:flex;align-items:center;gap:5px">👤 ${l.teacher} ${grpTag}</div>
            </div>
            <span style="font-size:11px;padding:3px 9px;border-radius:100px;background:${bg};color:${clr};font-weight:700;white-space:nowrap">${lbl}</span>
            <span style="font-size:11px;padding:3px 9px;border-radius:8px;background:#f5f5f5;color:#555;font-weight:600;white-space:nowrap">🚪 ${l.room}</span>
          </div>`;
      });
    }
    html += `</div></div>`;
  });

  html += `<div style="text-align:center;margin-top:16px;font-size:11px;color:#bbb">Згенеровано автоматично · rozklad-zanyat.web.app</div>`;

  const canvas = document.getElementById('exportCanvas');
  canvas.innerHTML = html;

  try {
    await new Promise(r => setTimeout(r, 200));
    const cvs = await html2canvas(canvas, {
      scale: 2, useCORS: true, allowTaint: true,
      backgroundColor: '#f0faf6',
      width: 900, windowWidth: 900
    });

    if (exportFormat === 'png') {
      const link = document.createElement('a');
      link.download = `rozklad_${groupLabel}_${new Date().toLocaleDateString('uk-UA').replace(/\./g,'-')}.png`;
      link.href = cvs.toDataURL('image/png');
      link.click();
      showToast('🖼 Картинку збережено', 'green');
    } else {
      const { jsPDF } = window.jspdf;
      const imgW = 210; // A4 mm
      const imgH = cvs.height * imgW / cvs.width;
      const pdf = new jsPDF({ orientation: imgH > 297 ? 'p' : 'p', unit: 'mm', format: 'a4' });
      let y = 0;
      const pageH = 297;
      while (y < imgH) {
        if (y > 0) pdf.addPage();
        pdf.addImage(cvs.toDataURL('image/png'), 'PNG', 0, -y, imgW, imgH);
        y += pageH;
      }
      pdf.save(`rozklad_${groupLabel}_${new Date().toLocaleDateString('uk-UA').replace(/\./g,'-')}.pdf`);
      showToast('📄 PDF збережено', 'green');
    }
  } catch(e) {
    showToast('❌ Помилка генерації', 'red');
    console.error(e);
  }

  canvas.innerHTML = '';
  progress.classList.remove('show');
  closeModal();
};

// Auto-refresh highlighting every minute
setInterval(() => { render(); }, 60000);
function showToast(msg, type) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast ' + (type || 'green');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
